name: pulse
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

# --- Runtime dependencies ---
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.5
  path_provider: ^2.1.3

  get_it: ^7.7.0
  injectable: ^2.4.2

  json_annotation: ^4.9.0
  dio: ^5.5.0+1
  retrofit: ^4.1.0
  dartz: ^0.10.1
  intl: ^0.19.0
  logger: ^2.4.0

  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.2
  freezed: ^2.5.7
  retrofit_generator: ^9.7.0
  intl_utils: ^2.8.4


  # Splash screen generator
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/screenshots/

# --- flutter_native_splash configuration ---
# Place your images into assets/images/ and adjust paths/colors as needed.
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash_android12.png
    icon_background_color: "#FFFFFF"
  web: false

flutter_intl:
  enabled: true
  arb_dir: lib/core/localization/l10n
  output_dir: lib/core/localization/generated