name: pulse
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

# --- Runtime dependencies ---
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:            # 👈 нужно для локализаций и device_preview
    sdk: flutter
  intl: ^0.20.2                     # 👈 совместимо с flutter_localizations и device_preview
  device_preview: ^1.2.0

  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flutter_svg: ^2.2.0

  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.5
  path_provider: ^2.1.3

  get_it: ^7.7.0
  injectable: ^2.4.2

  dio: ^5.5.0+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  logger: ^2.4.0

# --- Dev dependencies / codegen ---
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.2
  freezed: ^2.5.7
  retrofit_generator: ^9.7.0

  intl_utils: ^2.8.4               # 👈 генерация локализаций (flutter_intl)

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/screenshots/
    # - assets/illustrations/      # добавь, если будет нужно

# --- flutter_native_splash configuration ---
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash_android12.png
    icon_background_color: "#FFFFFF"
  web: false

# --- flutter_intl (intl_utils) ---
flutter_intl:
  enabled: true
  arb_dir: lib/core/localization/l10n
  output_dir: lib/core/localization/generated
